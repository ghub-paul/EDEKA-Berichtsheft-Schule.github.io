<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edeka Azubi Berichtsheft-Helfer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-image: url('https://edekajens.de/wp-content/uploads/2020/11/WCI_EDEKA_Tafel_quer_ohne_Kante_CMYK_juli_2020_a4-2.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: #333; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .container {
            background-color: rgba(255, 255, 255, 0.05); border-radius: 10px; padding: 20px;
            width: 90%; max-width: 500px; margin: 100px 0;
        }

        .card {
            background: white; border-radius: 8px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex; flex-direction: column; align-items: center;
        }

        .header-group {
            position: fixed; top: 20px; right: 20px;
            display: flex; flex-direction: column; align-items: center; width: 130px; z-index: 100;
        }

        .header-logo { width: 120px; margin-bottom: 5px; opacity: 0.9; }

        .class-tag {
            color: white; font-weight: 600; font-size: 14px;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.8); text-align: center; width: 100%;
        }

        h1 { font-size: 22px; margin-bottom: 5px; color: #000; text-align: center; }
        .sub { font-size: 13px; color: #666; margin-bottom: 15px; }

        textarea {
            width: 100%; height: 110px; padding: 12px; border: 1px solid #ccc; border-radius: 5px;
            font-family: inherit; font-size: 14px; box-sizing: border-box; margin-bottom: 10px; resize: none;
        }

        input {
            width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box;
        }

        button {
            background-color: #FFD600; color: #000; border: none; border-radius: 5px;
            padding: 12px; font-weight: 600; cursor: pointer; width: 100%; transition: 0.2s;
        }
        button:hover { background-color: #f0c300; }

        .btn-secondary { background-color: #f0f0f0; color: #555; font-size: 12px; margin-top: 8px; }
        .btn-back { background-color: #ffebee; color: #c62828; margin-top: 15px; font-size: 12px; display: none; }

        .footer { position: fixed; bottom: 10px; left: 10px; font-size: 11px; color: white; text-shadow: 1px 1px 2px #000; }
        
        #setup-screen, #main-screen, #output-screen { display: none; }

        .result-box {
            background: #f9f9f9; padding: 12px; border-radius: 5px; width: 100%; 
            font-size: 13px; white-space: pre-wrap; margin: 10px 0; border: 1px solid #eee; text-align: left;
        }
    </style>
</head>
<body>

    <div class="header-group">
        <img src="https://citycenter.de/wp-content/uploads/2021/06/logo-edeka-eisenhuettenstadt.png" alt="Edeka" class="header-logo">
        <div id="display-class" class="class-tag"></div>
    </div>

    <div class="container">
        <div id="setup-screen" class="card">
            <h1>Profil einrichten</h1>
            <p class="sub">Personalisiere deinen Generator:</p>
            <input type="text" id="setup-class" placeholder="Deine Klasse (z.B. 11 FI 2)">
            <p style="font-size: 11px; align-self: flex-start; margin-bottom: 5px;">Format: Tag: Fach1, Fach2 ...</p>
            <textarea id="setup-plan" placeholder="Montag: BGWP, IT-Tec, AEuP&#10;Dienstag: AEuP, PuG, Sport"></textarea>
            <button onclick="saveSetup()">Speichern & Loslegen</button>
        </div>

        <div id="main-screen" class="card">
            <h1 id="day-title">Tag</h1>
            <div id="subject-title" class="sub">Fach...</div>
            <textarea id="entry-input" placeholder="Was wurde gemacht?"></textarea>
            <button onclick="nextSubject()">Nächstes Fach (Enter)</button>
            <button class="btn-secondary" onclick="skipSubject()">Fach fällt aus</button>
            <button id="back-button" class="btn-back" onclick="goBack()">← Schritt zurück</button>
            <button class="btn-secondary" style="margin-top: 35px;" onclick="openSetup()">⚙️ Stundenplan bearbeiten</button>
        </div>

        <div id="output-screen" class="card">
            <h1>Dein Wochenbericht</h1>
            <div id="final-report" class="result-box"></div>
            <button onclick="copyToClipboard('final-report')">Bericht kopieren</button>
            <hr style="width:100%; margin: 20px 0; border: 0; border-top: 1px solid #eee;">
            <p style="font-size: 12px; font-weight: bold; margin: 0;">KI-PROMPT FÜR UNTERWEISUNG</p>
            <div id="ai-prompt" class="result-box" style="background: #fff3cd; color: #856404; border: 1px solid #ffeeba; font-size: 11px;"></div>
            <button style="background: #333; color: white;" onclick="copyToClipboard('ai-prompt')">Prompt kopieren & ChatGPT öffnen</button>
            <button class="btn-secondary" onclick="location.reload()">Neuer Bericht</button>
        </div>
    </div>

    <div class="footer">Made by Paul Ziese | Edeka Azubi-Tool</div>

<script>
    let schedule = [];
    let currentIndex = 0;
    let entries = []; // Speichert nur erfolgreiche Eingaben
    let history = []; // Speichert den Pfad (Index & Ob Skip oder nicht)

    window.onload = function() {
        const savedClass = localStorage.getItem('edeka_class');
        const savedPlan = localStorage.getItem('edeka_plan');
        if (savedClass && savedPlan) { initApp(savedClass); } 
        else { openSetup(); }
    };

    function openSetup() {
        document.getElementById('setup-screen').style.display = 'flex';
        document.getElementById('main-screen').style.display = 'none';
        document.getElementById('output-screen').style.display = 'none';
        document.getElementById('setup-class').value = localStorage.getItem('edeka_class') || "";
        document.getElementById('setup-plan').value = localStorage.getItem('edeka_plan_raw') || "";
    }

    function saveSetup() {
        const classVal = document.getElementById('setup-class').value.trim();
        const planVal = document.getElementById('setup-plan').value.trim();
        if (!classVal || !planVal) { alert("Bitte fülle Klasse und Plan aus!"); return; }

        localStorage.setItem('edeka_class', classVal);
        localStorage.setItem('edeka_plan_raw', planVal);
        
        const parsedPlan = [];
        planVal.split('\n').forEach(line => {
            const parts = line.split(':');
            if (parts.length === 2) {
                const day = parts[0].trim();
                parts[1].split(',').forEach(s => {
                    if(s.trim()) parsedPlan.push({ d: day, f: s.trim() });
                });
            }
        });
        localStorage.setItem('edeka_plan', JSON.stringify(parsedPlan));
        location.reload();
    }

    function initApp(className) {
        document.getElementById('display-class').innerText = className;
        schedule = JSON.parse(localStorage.getItem('edeka_plan'));
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('main-screen').style.display = 'flex';
        renderSubject();
    }

    function renderSubject() {
        if (currentIndex < schedule.length) {
            document.getElementById('day-title').innerText = schedule[currentIndex].d;
            document.getElementById('subject-title').innerText = "Fach: " + schedule[currentIndex].f;
            document.getElementById('entry-input').value = "";
            document.getElementById('entry-input').focus();
            
            // Zurück-Button nur zeigen, wenn wir nicht am Anfang sind
            document.getElementById('back-button').style.display = (currentIndex > 0) ? "block" : "none";
        } else { showResult(); }
    }

    function nextSubject() {
        const text = document.getElementById('entry-input').value.trim();
        if (text) {
            entries.push({ day: schedule[currentIndex].d, sub: schedule[currentIndex].f, val: text, index: currentIndex });
            currentIndex++; 
            renderSubject();
        } else {
            alert("Bitte gib ein, was du gemacht hast.");
        }
    }

    function skipSubject() {
        currentIndex++;
        renderSubject();
    }

    function goBack() {
        if (currentIndex > 0) {
            currentIndex--;
            // Falls der letzte Index in den Entries gespeichert war, löschen wir ihn
            entries = entries.filter(e => e.index < currentIndex);
            renderSubject();
        }
    }

    function showResult() {
        document.getElementById('main-screen').style.display = 'none';
        document.getElementById('output-screen').style.display = 'flex';
        let report = ""; let lastDay = "";
        entries.forEach(e => {
            if (e.day !== lastDay) { report += `\n*${e.day}*\n`; lastDay = e.day; }
            report += `${e.sub.toUpperCase()}: ${e.val}\n`;
        });
        document.getElementById('final-report').innerText = report.trim();
        
        const topics = entries.map(e => `${e.sub}: ${e.val}`).join(", ");
        
        document.getElementById('ai-prompt').innerText = 
            `Ich habe diese Woche folgende Themen in der Schule behandelt: [${topics}]. ` +
            `Such dir bitte das wichtigste fachliche Einzelthema heraus (lass Sport oder Pausen weg) und schreibe mir dafür eine kurze Unterweisung für mein Berichtsheft. ` +
            `WICHTIG: Schreib das so, dass es absolut NICHT nach KI klingt. Benutze einfache Sätze und verzichte auf geschwollene Wörter wie 'facettenreich' oder 'äußerst relevant'. ` +
            `Es soll so klingen, als hätte es ein Azubi kurz und bündig selbst zusammengefasst. ` +
            `Format: Erst ein fetter Titel für das Thema, dann 4 bis 5 einfache Sätze Fließtext.`;
    }

    function copyToClipboard(id) {
        const text = document.getElementById(id).innerText;
        navigator.clipboard.writeText(text);
        if(id === 'ai-prompt') window.open('https://chatgpt.com', '_blank');
        alert("In die Zwischenablage kopiert!");
    }

    document.getElementById('entry-input').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); nextSubject(); }
    });
</script>
</body>
</html>
